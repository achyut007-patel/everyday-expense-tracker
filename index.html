<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeloFin // Velocity Financial Portal</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-segment { display: none; width: 100%; height: 100vh; align-items: center; justify-content: center; }
        .page-segment.active { display: flex; animation: fadeIn 0.4s ease-out; }
        .welcome-viewport { flex-direction: column; text-align: center; background: radial-gradient(circle at 50% 45%, rgba(6, 182, 212, 0.12) 0%, transparent 55%); }
        .title-hero { font-size: 3.5rem; font-weight: 900; margin-bottom: 16px; color: #fff; }
        .title-hero span { background: linear-gradient(to right, var(--neon-blue), var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <!-- SECTION 1: WELCOME ROUTINE WINDOW -->
    <div id="segment-welcome" class="page-segment active welcome-viewport">
        <h1 class="title-hero">Velo<span>Fin Framework</span></h1>
        <p style="color:var(--text-muted); max-width:520px; font-size:1.05rem; line-height:1.6; margin-bottom:32px;">High-velocity asset logging pipelines, instant data serialization, and real-time ledger accounting.</p>
        <button onclick="goToSubAuth('login')" class="action-btn">Launch System Gateway <i class="fa-solid fa-bolt-lightning" style="margin-left:8px;"></i></button>
    </div>

    <!-- SECTION 2: AUTH SEGMENT CLUSTER -->
    <div id="segment-auth" class="page-segment">
        
        <!-- Login Form Element -->
        <div id="box-login" class="glass-panel" style="width: 100%; max-width: 400px;">
            <h2 style="font-size:24px; font-weight:800; margin-bottom:6px; text-align:center;">Operator Portal</h2>
            <p style="color:var(--text-muted); font-size:13px; text-align:center; margin-bottom:20px;">Provide system keys to decrypt user matrices</p>
            <form onsubmit="handleRouteToDashboard(event)">
                <div class="input-block">
                    <label>Terminal Operator Email ID</label>
                    <input type="text" value="student@college.edu" id="field-user-id" required>
                </div>
                <div class="input-block">
                    <label>System Passkey String</label>
                    <input type="password" value="admin123" id="field-pass-id" required>
                </div>
                <button type="submit" class="action-btn" style="width:100%; padding:12px;">Execute Secure Login</button>
            </form>
            <button onclick="toggleAuthForms('forgot')" style="width:100%; background:transparent; border:none; color:var(--neon-cyan); font-size:13px; margin-top:15px; cursor:pointer;">Forgot access parameters?</button>
        </div>

        <!-- Forgot Form Element -->
        <div id="box-forgot" class="glass-panel" style="width: 100%; max-width: 400px; display:none;">
            <h2 style="font-size:24px; font-weight:800; margin-bottom:6px; text-align:center;">Key Recovery</h2>
            <p style="color:var(--text-muted); font-size:13px; text-align:center; margin-bottom:20px;">Trigger emergency fallback multi-factor override</p>
            <form onsubmit="generateSystemOtp(event)">
                <div class="input-block">
                    <label>Account Registration Mail</label>
                    <input type="email" value="student@college.edu" required>
                </div>
                <button type="submit" class="action-btn" style="width:100%; padding:12px;">Transmit MFA OTP Code</button>
            </form>
            <button onclick="toggleAuthForms('login')" style="width:100%; background:transparent; border:none; color:var(--text-muted); font-size:13px; margin-top:15px; cursor:pointer;">Cancel Routine</button>
        </div>

        <!-- OTP Verification Form Element -->
        <div id="box-otp" class="glass-panel" style="width: 100%; max-width: 400px; display:none;">
            <h2 style="font-size:24px; font-weight:800; margin-bottom:6px; text-align:center;">Handshake Tokens</h2>
            <p id="alert-otp-box" style="background:rgba(59,130,246,0.1); color:var(--neon-blue); text-align:center; padding:10px; border-radius:6px; font-weight:700; border:1px dashed var(--neon-blue); font-size:13px; margin-bottom:20px;"></p>
            <form onsubmit="handleRouteToDashboard(event)">
                <div class="input-block">
                    <label>Enter Token Signature</label>
                    <input type="text" id="field-otp" placeholder="xxxxxx" style="text-align:center; font-size:22px; letter-spacing:5px;" required>
                </div>
                <button type="submit" class="action-btn" style="width:100%; padding:12px; background:linear-gradient(135deg, var(--neon-green), #059669);">Authorize Workspace</button>
            </form>
        </div>

    </div>

    <script>
        let liveOtpToken = null;

        function goToSubAuth(formType) {
            document.getElementById('segment-welcome').classList.remove('active');
            document.getElementById('segment-auth').classList.add('active');
            toggleAuthForms(formType);
        }

        function toggleAuthForms(targetForm) {
            document.getElementById('box-login').style.display = 'none';
            document.getElementById('box-forgot').style.display = 'none';
            document.getElementById('box-otp').style.display = 'none';
            document.getElementById(`box-${targetForm}`).style.display = 'block';
        }

        function generateSystemOtp(e) {
            e.preventDefault();
            liveOtpToken = Math.floor(100000 + Math.random() * 900000);
            document.getElementById('alert-otp-box').innerHTML = `SMS Gate Code String: <span style="text-decoration:underline;">${liveOtpToken}</span>`;
            toggleAuthForms('otp');
        }

        function handleRouteToDashboard(e) {
            e.preventDefault();
            // Core Page Relocation Route Execution Command
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
